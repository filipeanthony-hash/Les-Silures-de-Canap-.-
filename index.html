<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        .underwater-bg { background: radial-gradient(circle at center, #0c1a26 0%, #050a0f 100%); }
        .glass-card { background: rgba(25, 59, 87, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(74, 199, 242, 0.2); border-radius: 1.5rem; }
    </style>
</head>
<body class="underwater-bg h-full text-white font-sans p-4">

    <div id="login-screen" class="max-w-sm mx-auto mt-20 p-8 glass-card text-center shadow-2xl">
        <h2 class="text-2xl font-black mb-6 text-blue-300 uppercase tracking-widest">Accès Membres</h2>
        <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-4 rounded-xl bg-slate-900 border border-blue-500/50 mb-6 text-center focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button onclick="checkPass()" class="w-full py-4 bg-blue-600 rounded-xl font-black hover:bg-blue-500 transition-all shadow-lg">SE CONNECTER</button>
    </div>

    <div id="dashboard" class="hidden max-w-lg mx-auto space-y-6">
        <h2 class="text-center text-xl font-bold text-blue-200">Indices de Pêche Spécifiques</h2>
        
        <div class="glass-card p-6 text-center">
            <div class="text-4xl font-black text-blue-400 mb-1">15%</div>
            <div class="text-sm text-slate-400 uppercase tracking-widest">Activité Globale</div>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-sm">
                <thead class="bg-blue-900/30">
                    <tr>
                        <th class="p-3 text-left">ESPECE</th>
                        <th class="p-3">ACTIVITÉ</th>
                        <th class="p-3 text-right">TERRAIN</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-blue-500/10">
                    <tr><td class="p-3">Silure</td><td class="p-3 text-center text-red-400">5%</td><td class="p-3 text-right">Fleuve</td></tr>
                    <tr><td class="p-3">Brochet</td><td class="p-3 text-center text-blue-400">50%</td><td class="p-3 text-right">Rivière large</td></tr>
                    <tr><td class="p-3">Sandre</td><td class="p-3 text-center text-green-400">30%</td><td class="p-3 text-right">Lac profond</td></tr>
                    <tr><td class="p-3">Anguille</td><td class="p-3 text-center text-purple-400">90%</td><td class="p-3 text-right">Étang</td></tr>
                    <tr><td class="p-3">Truite</td><td class="p-3 text-center text-orange-400">90%</td><td class="p-3 text-right">Fleuve</td></tr>
                </tbody>
            </table>
        </div>

        <p class="text-center text-xs text-slate-500"><button onclick="logout()" class="underline">Déconnexion</button></p>
    </div>

    <script>
        function checkPass() {
            if (document.getElementById('pass').value === "1234") {
                localStorage.setItem("isLoggedIn", "true");
                showDashboard();
            } else { alert("Mot de passe incorrect"); }
        }
        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
        }
        function logout() { localStorage.removeItem("isLoggedIn"); location.reload(); }
        window.onload = () => { if (localStorage.getItem("isLoggedIn") === "true") showDashboard(); };
    </script>
</body>
</html>
