<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .underwater-bg { background: radial-gradient(circle at center, #0c1a26 0%, #050a0f 100%); }
        .glass-card { background: rgba(25, 59, 87, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(74, 199, 242, 0.2); border-radius: 1.5rem; }
    </style>
</head>
<body class="underwater-bg min-h-screen text-white font-sans p-4">

    <div id="login-screen" class="w-full max-w-sm mx-auto p-8 glass-card text-center shadow-2xl mt-10">
        <h2 class="text-2xl font-black mb-6 text-blue-300 uppercase tracking-widest">Accès Membres</h2>
        <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-4 rounded-xl bg-slate-900 border border-blue-500/50 mb-6 text-center focus:outline-none focus:ring-2 focus:ring-blue-400">
        <button onclick="checkPass()" class="w-full py-4 bg-blue-600 rounded-xl font-black hover:bg-blue-500 transition-all shadow-lg">SE CONNECTER</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-md mx-auto space-y-6">
        
        <div class="glass-card p-6 text-center">
            <h2 class="text-xl font-bold text-blue-200 mb-4">Indice d'Activité Globale</h2>
            <div id="gps-status" class="text-lg font-black text-blue-400 mb-2">0%</div>
            <p id="gps-coords" class="text-xs text-slate-400">En attente de position GPS...</p>
            <button onclick="getGPS()" class="mt-4 text-[10px] bg-blue-900/50 px-3 py-1 rounded-full border border-blue-500">Actualiser GPS</button>
        </div>

        <div class="glass-card overflow-hidden">
            <h3 class="p-4 text-center text-blue-200 font-bold border-b border-blue-500/20">Probabilités par Lieu</h3>
            <table class="w-full text-xs text-center">
                <thead>
                    <tr class="text-slate-400 border-b border-blue-500/10">
                        <th class="p-3 text-left">LIEU</th>
                        <th class="p-3">PROBABILITÉ</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-blue-500/10">
                    <tr><td class="p-3 text-left font-bold">Rivière</td><td class="p-3 text-blue-400 font-black">75%</td></tr>
                    <tr><td class="p-3 text-left font-bold">Lac</td><td class="p-3 text-green-400 font-black">45%</td></tr>
                    <tr><td class="p-3 text-left font-bold">Étang</td><td class="p-3 text-orange-400 font-black">30%</td></tr>
                </tbody>
            </table>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <a href="https://www.facebook.com/share/g/1Fe5eQhNqP/" class="glass-card p-6 flex flex-col items-center hover:bg-blue-900/40 transition-all">
                <i class="fab fa-facebook text-3xl text-blue-500 mb-2"></i>
                <span class="text-xs font-bold">Facebook</span>
            </a>
            <a href="https://www.twitch.tv" class="glass-card p-6 flex flex-col items-center hover:bg-purple-900/40 transition-all">
                <i class="fab fa-twitch text-3xl text-purple-500 mb-2"></i>
                <span class="text-xs font-bold">Twitch</span>
            </a>
        </div>
        
        <p class="text-center text-xs text-slate-500"><button onclick="logout()" class="underline">Déconnexion</button></p>
    </div>

    <script>
        function getGPS() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition((pos) => {
                    document.getElementById('gps-coords').innerText = "Lat: " + pos.coords.latitude.toFixed(4) + " | Lon: " + pos.coords.longitude.toFixed(4);
                    document.getElementById('gps-status').innerText = "68% (Activité Haute)";
                });
            }
        }

        function checkPass() {
            if (document.getElementById('pass').value === "1234") {
                localStorage.setItem("isLoggedIn", "true");
                showDashboard();
            } else { alert("Mot de passe incorrect"); }
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            getGPS(); // Tente de récupérer la position dès l'ouverture
        }

        function logout() { localStorage.removeItem("isLoggedIn"); location.reload(); }
        window.onload = () => { if (localStorage.getItem("isLoggedIn") === "true") showDashboard(); };
    </script>
</body>
</html>
