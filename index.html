<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .river-bg { background: linear-gradient(180deg, #e0f2f1 0%, #b2dfdb 100%); }
        .glass-card-river { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(178, 223, 219, 0.5); border-radius: 1.5rem; }
        body, body * { color: #000000 !important; }
        .btn-fb { background-color: #1877F2 !important; color: white !important; }
        .border-fb { border-color: #1877F2 !important; }
        .text-fb { color: #1877F2 !important; }
    </style>
</head>
<body class="river-bg min-h-screen font-sans p-4">

    <div id="login-screen" class="w-full max-w-sm mx-auto p-8 glass-card-river text-center shadow-xl mt-10 border-fb">
        <h2 class="text-2xl font-black mb-6 uppercase tracking-widest">Accès Membres</h2>
        <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-4 rounded-xl bg-white/50 border border-fb mb-6 text-center focus:outline-none">
        <button onclick="checkPass()" class="w-full py-4 btn-fb rounded-xl font-black hover:opacity-90 transition-all">SE CONNECTER</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-md mx-auto space-y-4">
        
        <div class="flex justify-between items-center px-2">
            <h2 class="text-[10px] font-bold uppercase" id="city-name">Localisation...</h2>
            <div class="flex gap-3 items-center">
                <button onclick="window.open('https://chat.whatsapp.com/KfltuoycOB548IujbIB38q', '_blank')" class="text-green-600 text-3xl"><i class="fab fa-whatsapp"></i></button>
                <button onclick="window.open('https://www.facebook.com/share/g/1Fe5eQhNqP/', '_blank')" class="text-fb text-3xl"><i class="fab fa-facebook"></i></button>
                <button onclick="toggleSpots()" class="btn-fb px-4 py-2 rounded-lg text-[10px] font-black uppercase shadow-lg hover:opacity-90 transition-all">Spots</button>
            </div>
        </div>

        <div class="glass-card-river p-3 border-fb flex items-center gap-3">
            <i class="fas fa-bell text-fb text-xl"></i>
            <marquee behavior="scroll" direction="left" class="text-[11px] font-bold" id="notif-bar">
                Bienvenue sur le groupe Les Silures de Canapé !
            </marquee>
        </div>

        <div id="spots-section" class="hidden glass-card-river p-4 space-y-2 border-fb">
            <h3 class="text-[10px] font-bold uppercase mb-2">Liste des Spots</h3>
            <div id="spots-list" class="space-y-2"></div>
        </div>

        <div class="glass-card-river p-6 text-center border-2 border-fb">
            <div id="final-index" class="text-5xl font-black">0%</div>
            <p id="weather-status" class="text-[10px] mt-2 italic">Calcul en cours...</p>
        </div>

        <div class="glass-card-river p-4 space-y-4 border-fb">
            <div>
                <div class="flex justify-between text-[10px] font-bold mb-2"><span>🌧️ Pluie</span><span>☀️ Beau Temps</span></div>
                <input type="range" id="meteo-slider" min="0" max="100" value="50" class="w-full h-2 bg-blue-100 rounded-lg cursor-pointer" oninput="calculateIndex()">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="temp-slider" min="5" max="25" value="15" class="p-2 bg-white/50 rounded-lg text-center text-xs border border-fb" oninput="calculateIndex()">
                <select id="moon-phase" onchange="calculateIndex()" class="p-2 bg-white/50 rounded-lg text-xs border border-fb">
                    <option value="0.8">🌑 Nouvelle</option><option value="1.0">🌗 Quartier</option><option value="1.4">🌕 Pleine</option>
                </select>
            </div>
            <select id="fish-select" onchange="calculateIndex()" class="w-full p-3 rounded-xl bg-white/50 border border-fb text-xs">
                <option value="Silure">Silure</option><option value="Truite">Truite</option>
                <option value="Brochet">Brochet</option><option value="Perche">Perche</option>
            </select>
        </div>

        <div class="glass-card-river overflow-hidden border-fb">
            <table class="w-full text-xs text-center">
                <thead><tr class="bg-blue-100"><th class="p-3">LIEU</th><th class="p-3">PROBABILITÉ</th></tr></thead>
                <tbody id="prob-table"></tbody>
            </table>
        </div>

        <p class="text-center text-xs underline"><button onclick="logout()">Déconnexion</button></p>
        
        <div class="mt-4 pb-6">
            <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" alt="Les Silures de Canapé" class="w-full rounded-2xl border-4 border-white shadow-xl">
        </div>
    </div>

    <script>
        const notificationText = "Bienvenue sur le groupe Les Silures de Canapé !";
        document.getElementById('notif-bar').innerText = notificationText;

        // CORRECTION FAITE ICI : la guillemet fermante a été ajoutée après Tournan-en-Brie
        const mySpots = [{ name: "36 Rue René Leblond, 77220 Tournan-en-Brie", url: "https://www.google.com/maps" }, { name: "Nouveau Spot", url: "#" }];
        
        const fishData = {
            "Silure": { "Rivière": "80%", "Lac": "60%" }, "Truite": { "Rivière": "90%", "Lac": "30%" },
            "Brochet": { "Rivière": "60%", "Lac": "85%" }, "Perche": { "Rivière": "70%", "Lac": "75%" }
        };

        function toggleSpots() { 
            const section = document.getElementById('spots-section');
            section.classList.toggle('hidden');
            if(!section.classList.contains('hidden')) {
                document.getElementById('spots-list').innerHTML = mySpots.map(s => 
                    `<div onclick="openSpot('${s.url}')" class="block w-full text-left bg-blue-50 p-2 rounded text-[10px] cursor-pointer hover:bg-blue-100 transition-colors font-bold">${s.name}</div>`
                ).join('');
            }
        }

        function openSpot(url) {
            if(url !== "#") { window.open(url, '_blank'); } else { alert("Lien non disponible."); }
        }

        function calculateIndex() {
            const meteo = parseInt(document.getElementById('meteo-slider').value);
            const temp = parseInt(document.getElementById('temp-slider').value);
            const moon = parseFloat(document.getElementById('moon-phase').value);
            const fish = document.getElementById('fish-select').value;
            let score = Math.floor(((meteo < 50 ? 60 : 40) + (temp >= 12 && temp <= 18 ? 20 : 0)) * moon);
            document.getElementById('final-index').innerText = Math.min(100, score) + "%";
            document.getElementById('weather-status').innerText = meteo < 50 ? "🌧️ Tendance Pluvieuse" : "☀️ Tendance Ensoleillée";
            
            const table = document.getElementById('prob-table');
            table.innerHTML = "";
            for (let lieu in fishData[fish]) {
                table.innerHTML += `<tr><td class="p-3">${lieu}</td><td class="p-3 font-bold">${fishData[fish][lieu]}</td></tr>`;
            }
        }

        async function initApp() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (p) => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
                        const d = await res.json();
                        document.getElementById('city-name').innerText = d.address.town || d.address.city || "Localisation";
                    } catch(e) { document.getElementById('city-name').innerText = "Paris"; }
                });
            }
            calculateIndex();
        }

        function checkPass() {
            if (document.getElementById('pass').value === "198502") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                initApp();
            } else { alert("Mot de passe incorrect"); }
        }
        function logout() { location.reload(); }
    </script>
</body>
</html>
