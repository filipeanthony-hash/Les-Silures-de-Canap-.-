<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Thème clair et lumineux */
        .light-blue-bg { background: linear-gradient(180deg, #e0f7fa 0%, #b3e5fc 100%); }
        .glass-card-light { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 1.5rem; color: #1e3a8a; }
        .text-main { color: #1e3a8a; }
    </style>
</head>
<body class="light-blue-bg min-h-screen text-main font-sans p-4">

    <div id="login-screen" class="w-full max-w-sm mx-auto p-8 glass-card-light text-center shadow-xl mt-10">
        <h2 class="text-2xl font-black mb-6 uppercase tracking-widest">Accès Membres</h2>
        <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-4 rounded-xl bg-white/50 border border-blue-200 mb-6 text-center focus:outline-none">
        <button onclick="checkPass()" class="w-full py-4 bg-blue-500 text-white rounded-xl font-black hover:bg-blue-400 transition-all">SE CONNECTER</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-md mx-auto space-y-4">
        
        <div class="flex justify-between items-center px-2">
            <h2 class="text-[10px] font-bold text-blue-600 uppercase" id="city-name">Localisation...</h2>
            <div class="flex gap-4 items-center">
                <a href="https://www.facebook.com/share/g/1Fe5eQhNqP/" target="_blank" class="text-blue-500 text-3xl"><i class="fab fa-facebook"></i></a>
                <button onclick="toggleSpots()" class="bg-blue-500 text-white px-5 py-2 rounded-lg text-[11px] font-black uppercase shadow-lg hover:bg-blue-400 transition-all">Spots</button>
            </div>
        </div>

        <div id="spots-section" class="hidden glass-card-light p-4 space-y-2">
            <h3 class="text-[10px] font-bold text-blue-500 uppercase mb-2">Liste des Spots</h3>
            <div id="spots-list" class="space-y-2"></div>
        </div>

        <div class="glass-card-light p-6 text-center border-2 border-white">
            <div id="final-index" class="text-5xl font-black text-blue-600">0%</div>
            <p id="weather-status" class="text-[10px] text-blue-400 mt-2 italic">Calcul en cours...</p>
        </div>

        <div class="glass-card-light p-4 space-y-4">
            <div>
                <div class="flex justify-between text-[10px] font-bold text-blue-500 mb-2"><span>🌧️ Pluie</span><span>☀️ Beau Temps</span></div>
                <input type="range" id="meteo-slider" min="0" max="100" value="50" class="w-full h-2 bg-blue-200 rounded-lg cursor-pointer" oninput="calculateIndex()">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="temp-slider" min="5" max="25" value="15" class="p-2 bg-white/50 rounded-lg text-center text-xs" oninput="calculateIndex()">
                <select id="moon-phase" onchange="calculateIndex()" class="p-2 bg-white/50 rounded-lg text-xs">
                    <option value="0.8">🌑 Nouvelle</option><option value="1.0">🌗 Quartier</option><option value="1.4">🌕 Pleine</option>
                </select>
            </div>
            <select id="fish-select" onchange="calculateIndex()" class="w-full p-3 rounded-xl bg-white/50 border border-blue-200 text-xs">
                <option value="Silure">Silure</option><option value="Truite">Truite</option>
                <option value="Brochet">Brochet</option><option value="Perche">Perche</option>
            </select>
        </div>

        <div class="glass-card-light overflow-hidden">
            <table class="w-full text-xs text-center">
                <thead><tr class="bg-blue-500/10"><th class="p-3">LIEU</th><th class="p-3">PROBABILITÉ</th></tr></thead>
                <tbody id="prob-table"></tbody>
            </table>
        </div>

        <p class="text-center text-xs text-blue-400 underline"><button onclick="logout()">Déconnexion</button></p>
        
        <div class="mt-4 pb-6">
            <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" alt="Les Silures de Canapé" class="w-full rounded-2xl border-4 border-white shadow-xl">
        </div>
    </div>

    <script>
        const mySpots = [{ name: "77220 Tournan-en-Brie", url: "#" }, { name: "Nouveau Spot", url: "#" }];
        const fishData = {
            "Silure": { "Rivière": "80%", "Lac": "60%" }, "Truite": { "Rivière": "90%", "Lac": "30%" },
            "Brochet": { "Rivière": "60%", "Lac": "85%" }, "Perche": { "Rivière": "70%", "Lac": "75%" }
        };

        function toggleSpots() { 
            const section = document.getElementById('spots-section');
            section.classList.toggle('hidden');
            if(!section.classList.contains('hidden')) {
                document.getElementById('spots-list').innerHTML = mySpots.map(s => `<a href="${s.url}" class="block bg-blue-100 p-2 rounded text-[10px] text-blue-700">${s.name}</a>`).join('');
            }
        }

        function calculateIndex() {
            const meteo = parseInt(document.getElementById('meteo-slider').value);
            const temp = parseInt(document.getElementById('temp-slider').value);
            const moon = parseFloat(document.getElementById('moon-phase').value);
            const fish = document.getElementById('fish-select').value;
            let score = Math.floor(((meteo < 50 ? 60 : 40) + (temp >= 12 && temp <= 18 ? 20 : 0)) * moon);
            document.getElementById('final-index').innerText = Math.min(100, score) + "%";
            document.getElementById('weather-status').innerText = meteo < 50 ? "🌧️ Tendance Pluvieuse" : "☀️ Tendance Ensoleillée";
            const table = document.getElementById('prob-table');
            table.innerHTML = "";
            for (let lieu in fishData[fish]) table.innerHTML += `<tr><td class="p-3">${lieu}</td><td class="p-3 font-bold text-blue-600">${fishData[fish][lieu]}</td></tr>`;
        }

        function checkPass() {
            if (document.getElementById('pass').value === "198502") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                calculateIndex();
            } else { alert("Mot de passe incorrect"); }
        }
        function logout() { location.reload(); }
    </script>
</body>
</html>
