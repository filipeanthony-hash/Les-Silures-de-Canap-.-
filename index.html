<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .underwater-bg { background: radial-gradient(circle at center, #0c1a26 0%, #050a0f 100%); }
        .glass-card { background: rgba(25, 59, 87, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(74, 199, 242, 0.2); border-radius: 1.5rem; }
    </style>
</head>
<body class="underwater-bg min-h-screen text-white font-sans p-4">

    <div id="login-screen" class="w-full max-w-sm mx-auto p-8 glass-card text-center shadow-2xl mt-10">
        <h2 class="text-2xl font-black mb-6 text-blue-300 uppercase tracking-widest">Accès Membres</h2>
        <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-4 rounded-xl bg-slate-900 border border-blue-500/50 mb-6 text-center focus:outline-none">
        <button onclick="checkPass()" class="w-full py-4 bg-blue-600 rounded-xl font-black hover:bg-blue-500 transition-all">SE CONNECTER</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-md mx-auto space-y-4">
        
        <div class="flex justify-between items-center px-2">
            <h2 class="text-[10px] font-bold text-blue-300 uppercase" id="city-name">Localisation...</h2>
            <div class="flex gap-4 items-center">
                <a href="https://www.facebook.com/share/g/1Fe5eQhNqP/" target="_blank" class="text-blue-400 text-3xl"><i class="fab fa-facebook"></i></a>
                <button onclick="toggleSpots()" class="bg-blue-800/60 border-2 border-blue-300 text-white px-5 py-2 rounded-lg text-[11px] font-black uppercase tracking-wider shadow-[0_0_10px_rgba(147,197,253,0.5)] hover:bg-blue-600 transition-all">
                    Spots
                </button>
            </div>
        </div>

        <div id="spots-section" class="hidden glass-card p-4 space-y-2">
            <h3 class="text-[10px] font-bold text-blue-300 uppercase mb-2">Liste des Spots Partagés</h3>
            <div id="spots-list" class="space-y-2"></div>
        </div>

        <div class="glass-card p-6 text-center border-2 border-blue-400/30">
            <div id="final-index" class="text-5xl font-black text-blue-400">0%</div>
            <p id="weather-status" class="text-[10px] text-slate-400 mt-2 italic">Calcul en temps réel...</p>
        </div>

        <div class="glass-card p-4 space-y-4">
            <div>
                <div class="flex justify-between text-[10px] font-bold text-blue-300 mb-2"><span>🌧️ Pluie</span><span>☀️ Beau Temps</span></div>
                <input type="range" id="meteo-slider" min="0" max="100" value="50" class="w-full h-2 bg-blue-900 rounded-lg cursor-pointer" oninput="calculateIndex()">
            </div>
            
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="temp-slider" min="5" max="25" value="15" class="p-2 bg-slate-900 rounded-lg text-center text-xs" oninput="calculateIndex()" placeholder="Temp °C">
                <select id="moon-phase" onchange="calculateIndex()" class="p-2 bg-slate-900 rounded-lg text-xs">
                    <option value="0.8">🌑 Nouvelle</option><option value="1.0">🌗 Quartier</option><option value="1.4">🌕 Pleine</option>
                </select>
            </div>

            <select id="fish-select" onchange="calculateIndex()" class="w-full p-3 rounded-xl bg-slate-900 border border-blue-500/50 text-white text-xs">
                <option value="Silure">Silure</option><option value="Truite">Truite</option>
                <option value="Brochet">Brochet</option><option value="Perche">Perche</option>
                <option value="Anguille">Anguille</option><option value="Carpe">Carpe</option>
            </select>
        </div>

        <div class="glass-card overflow-hidden">
            <table class="w-full text-xs text-center text-white">
                <thead><tr class="bg-blue-900/30"><th class="p-3">LIEU</th><th class="p-3">PROBABILITÉ</th></tr></thead>
                <tbody id="prob-table"></tbody>
            </table>
        </div>

        <p class="text-center text-xs text-slate-500"><button onclick="logout()" class="underline">Déconnexion</button></p>
        
        <div class="mt-4">
            <img src="https://i.postimg.cc/yY1bXpD4/1779352785742.png" alt="Les Silures de Canapé" class="w-full rounded-2xl border border-blue-500/30 shadow-lg">
        </div>
    </div>

    <script>
        const mySpots = [
            { name: "77220 Tournan-en-Brie", url: "https://maps.app.goo.gl/WcPo8FsBS1EmzdVN9?g_st=iw" },
            { name: "Nouveau Spot", url: "Https://maps.app.goo.gl/WcPo8FsBS1EmzdVN9?g_st=iwAjoute-moi" }
        ];

        const fishData = {
            "Silure": { "Rivière": "80%", "Lac": "60%" }, "Truite": { "Rivière": "90%", "Lac": "30%" },
            "Brochet": { "Rivière": "60%", "Lac": "85%" }, "Perche": { "Rivière": "70%", "Lac": "75%" },
            "Anguille": { "Rivière": "40%", "Lac": "20%" }, "Carpe": { "Rivière": "30%", "Lac": "70%" }
        };

        function toggleSpots() { 
            const section = document.getElementById('spots-section');
            section.classList.toggle('hidden');
            if(!section.classList.contains('hidden')) {
                const list = document.getElementById('spots-list');
                list.innerHTML = mySpots.map(s => `<a href="${s.url}" target="_blank" class="block bg-blue-900/20 p-2 rounded text-[10px] text-blue-300 hover:text-white border border-blue-500/20">${s.name}</a>`).join('');
            }
        }

        function calculateIndex() {
            const meteo = parseInt(document.getElementById('meteo-slider').value);
            const temp = parseInt(document.getElementById('temp-slider').value);
            const moon = parseFloat(document.getElementById('moon-phase').value);
            const fish = document.getElementById('fish-select').value;
            
            let score = (meteo < 50) ? 60 : 40;
            if (temp >= 12 && temp <= 18) score += 20;
            score = Math.floor(score * moon);
            
            document.getElementById('final-index').innerText = Math.min(100, score) + "%";
            document.getElementById('weather-status').innerText = meteo < 50 ? "🌧️ Tendance Pluvieuse" : "☀️ Tendance Ensoleillée";

            const table = document.getElementById('prob-table');
            table.innerHTML = "";
            for (let lieu in fishData[fish]) {
                table.innerHTML += `<tr><td class="p-3">${lieu}</td><td class="p-3 font-bold text-blue-400">${fishData[fish][lieu]}</td></tr>`;
            }
        }

        async function initApp() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (p) => {
                    try {
                        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${p.coords.latitude}&lon=${p.coords.longitude}`);
                        const d = await res.json();
                        document.getElementById('city-name').innerText = d.address.town || d.address.city || "Localisation";
                    } catch(e) { document.getElementById('city-name').innerText = "Paris"; }
                });
            }
            calculateIndex();
        }

        function checkPass() {
            if (document.getElementById('pass').value === "198502") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                initApp();
            } else { alert("Mot de passe incorrect"); }
        }
        function logout() { location.reload(); }
    </script>
</body>
</html>
