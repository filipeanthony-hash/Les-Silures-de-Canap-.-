<!DOCTYPE html>
<html lang="fr" class="h-full">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Silures de Canapé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .underwater-bg { background: radial-gradient(circle at center, #0c1a26 0%, #050a0f 100%); }
        .glass-card { background: rgba(25, 59, 87, 0.4); backdrop-filter: blur(15px); border: 1px solid rgba(74, 199, 242, 0.2); border-radius: 1.5rem; }
        .input-marine { background: rgba(10, 25, 41, 0.6); border: 1px solid rgba(74, 199, 242, 0.15); color: white; }
    </style>
</head>
<body class="underwater-bg min-h-screen text-white font-sans p-4">

    <div id="login-screen" class="w-full max-w-sm mx-auto p-8 glass-card text-center shadow-2xl mt-10">
        <h2 class="text-2xl font-black mb-6 text-blue-300 uppercase tracking-widest">Accès Membres</h2>
        <input type="password" id="pass" placeholder="Mot de passe" class="w-full p-4 rounded-xl bg-slate-900 border border-blue-500/50 mb-6 text-center focus:outline-none">
        <button onclick="checkPass()" class="w-full py-4 bg-blue-600 rounded-xl font-black hover:bg-blue-500 transition-all">SE CONNECTER</button>
    </div>

    <div id="dashboard" class="hidden w-full max-w-md mx-auto space-y-4">
        
        <div class="glass-card p-6 text-center border-2 border-blue-400/30">
            <h2 class="text-xs font-bold text-blue-300 uppercase tracking-widest" id="city-name">Localisation...</h2>
            <div id="final-index" class="text-5xl font-black text-blue-400 my-2">50%</div>
            <p class="text-[10px] text-slate-400">Indice d'activité en temps réel</p>
        </div>

        <div class="glass-card p-4 space-y-4">
            <div>
                <label class="text-xs font-bold text-blue-300">Temp. Eau : <span id="temp-val">15</span>°C</label>
                <input type="range" id="temp-slider" min="5" max="25" value="15" class="w-full" oninput="calculateIndex()">
            </div>
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setWeather('sun')" class="p-2 bg-yellow-600/30 rounded-lg text-xs">☀️ Beau</button>
                <button onclick="setWeather('rain')" class="p-2 bg-blue-600/30 rounded-lg text-xs">🌧️ Pluie</button>
            </div>
            <select id="moon-phase" onchange="calculateIndex()" class="w-full p-2 bg-slate-900 rounded-lg text-xs">
                <option value="1">Nouvelle Lune</option>
                <option value="1.2">Premier Quartier</option>
                <option value="1.5">Pleine Lune</option>
            </select>
        </div>

        <div class="glass-card p-4">
            <h2 class="text-xs font-bold text-blue-300 mb-3 uppercase">Photos des Nœuds</h2>
            <div class="grid grid-cols-3 gap-2" id="knot-list"></div>
            <input type="file" id="upload-knot" class="hidden" onchange="previewKnot(this)">
            <button onclick="document.getElementById('upload-knot').click()" class="mt-3 w-full py-2 bg-blue-900/30 rounded-lg text-[10px] border border-dashed border-blue-500/50">+ Ajouter</button>
        </div>

        <p class="text-center text-xs text-slate-500"><button onclick="logout()" class="underline">Déconnexion</button></p>
    </div>

    <script>
        let weather = 'sun';

        async function getCityName(lat, lon) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                const data = await response.json();
                document.getElementById('city-name').innerText = data.address.city || data.address.town || "Localisation trouvée";
            } catch(e) { document.getElementById('city-name').innerText = "Erreur localisation"; }
        }

        function calculateIndex() {
            const temp = document.getElementById('temp-slider').value;
            const moon = parseFloat(document.getElementById('moon-phase').value);
            document.getElementById('temp-val').innerText = temp;
            let score = (weather === 'rain') ? 60 : 40;
            if (temp >= 12 && temp <= 18) score += 20;
            document.getElementById('final-index').innerText = Math.min(100, Math.floor(score * moon)) + "%";
        }

        function setWeather(w) { weather = w; calculateIndex(); }

        function previewKnot(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const div = document.createElement('div');
                    div.className = "bg-slate-800 rounded-lg overflow-hidden h-16";
                    div.innerHTML = `<img src="${e.target.result}" class="w-full h-full object-cover">`;
                    document.getElementById('knot-list').appendChild(div);
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function checkPass() {
            if (document.getElementById('pass').value === "1234") {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                if (navigator.geolocation) navigator.geolocation.getCurrentPosition(pos => getCityName(pos.coords.latitude, pos.coords.longitude));
                calculateIndex();
            } else { alert("Mot de passe incorrect"); }
        }
        function logout() { location.reload(); }
    </script>
</body>
</html>
